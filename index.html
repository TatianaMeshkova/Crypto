<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Crypto Chaos Terminal</title>
  <style>
    :root{
      --bg:#071226;
      --panel:#0f1d3a;
      --panel2:#16264b;
      --text:#eaf0ff;
      --muted:#9fb0d9;
      --ok:#17c964;
      --warn:#f5a524;
      --bad:#f31260;
      --border:#243b73;
      --btn:#79aaff;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
      background:linear-gradient(180deg,#06101f 0%, #0a1831 100%);
      color:var(--text);
      padding:18px 14px 28px;
    }
    .wrap{max-width:980px;margin:0 auto}
    h1{
      margin:8px 0 6px;
      font-size:34px;
      line-height:1.04;
      font-weight:800;
      letter-spacing:-0.03em;
    }
    .sub{
      color:var(--muted);
      font-size:18px;
      margin-bottom:16px;
    }
    .toolbar{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:10px;
    }
    button, select{
      border:none;
      border-radius:16px;
      padding:14px 16px;
      font-size:18px;
      font-weight:700;
    }
    button{
      background:var(--btn);
      color:#081427;
      min-width:120px;
      cursor:pointer;
    }
    select{
      background:var(--panel2);
      color:var(--text);
      border:1px solid var(--border);
    }
    .status{
      font-size:16px;
      color:var(--muted);
      margin:4px 0 14px;
    }
    .sectionTitle{
      font-size:20px;
      font-weight:800;
      margin:18px 0 10px;
    }
    .topgrid, .grid{
      display:grid;
      grid-template-columns:1fr;
      gap:12px;
    }
    .card{
      background:rgba(15,29,58,0.95);
      border:1px solid var(--border);
      border-radius:22px;
      padding:16px;
      box-shadow:0 10px 25px rgba(0,0,0,0.16);
    }
    .headline{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
    }
    .coin{
      font-size:26px;
      font-weight:800;
    }
    .price{
      font-size:20px;
      font-weight:700;
    }
    .mode{
      font-size:22px;
      font-weight:800;
      margin-top:10px;
    }
    .decision{
      font-size:20px;
      font-weight:800;
      margin-top:8px;
    }
    .localDecision{
      font-size:18px;
      font-weight:800;
      margin-top:6px;
    }
    .gate{
      font-size:30px;
      font-weight:900;
      margin-top:6px;
    }
    .chaosLevel{
      font-size:30px;
      font-weight:900;
      margin-top:6px;
    }
    .up{color:var(--ok)}
    .down{color:var(--bad)}
    .range{color:var(--warn)}
    .chaos{color:var(--bad)}
    .allow{color:var(--ok)}
    .caution{color:var(--warn)}
    .skip{color:var(--bad)}
    .meta{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      color:var(--muted);
      font-size:14px;
      margin-top:10px;
    }
    .label{
      color:var(--muted);
      font-size:14px;
    }
    .big{
      font-size:24px;
      font-weight:800;
    }
    .mini{
      font-size:15px;
      color:var(--muted);
      margin-top:8px;
      line-height:1.4;
    }
    .split{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }
    .split3{
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:12px;
    }
    .warnbox, .dangerbox, .infobox, .okbox{
      border-radius:18px;
      padding:12px;
      margin-top:10px;
    }
    .warnbox{
      border:1px solid rgba(245,165,36,0.35);
      background:rgba(245,165,36,0.08);
    }
    .dangerbox{
      border:1px solid rgba(243,18,96,0.35);
      background:rgba(243,18,96,0.08);
    }
    .infobox{
      border:1px solid rgba(121,170,255,0.35);
      background:rgba(121,170,255,0.08);
    }
    .okbox{
      border:1px solid rgba(23,201,100,0.35);
      background:rgba(23,201,100,0.08);
    }
    @media (max-width:880px){
      .split3{grid-template-columns:1fr}
    }
    @media (max-width:640px){
      .split{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Crypto Chaos Terminal</h1>
    <div class="sub">BTC • ETH • SOL • XRP • 1m candles • окно 30 минут • BTC.D / USDT.D / Polymarket / Manual Macro Calendar</div>

    <div class="toolbar">
      <button id="refreshBtn">Refresh</button>
      <button id="toggleBtn">Start</button>
      <select id="intervalSelect">
        <option value="10000">10 sec</option>
        <option value="15000" selected>15 sec</option>
        <option value="30000">30 sec</option>
        <option value="60000">60 sec</option>
      </select>
    </div>

    <div id="appStatus" class="status">Stopped</div>

    <div class="topgrid" id="topCards"></div>

    <div class="sectionTitle">BTC filter + монеты</div>
    <div class="grid" id="coinCards"></div>
  </div>

  <script>
    const SYMBOLS = ["BTCUSDT", "ETHUSDT", "SOLUSDT", "XRPUSDT"];
    const LOOKBACK = 30;

    const SETTINGS = {
      DOMINANCE_REFRESH_MS: 60000,
      USDT_DOM_MEDIUM_DELTA: 0.05,
      USDT_DOM_HIGH_DELTA: 0.10,
      BTC_DOM_MEDIUM_DELTA: 0.08,
      BTC_DOM_HIGH_DELTA: 0.15
    };

    const EVENT_SETTINGS = {
      POLY_REFRESH_MS: 60000,
      CAL_REFRESH_MS: 60000,
      POLY_KEYWORDS: [
        "fed",
        "fomc",
        "powell",
        "cpi",
        "pce",
        "inflation",
        "nfp",
        "payrolls",
        "jobless",
        "interest rate",
        "recession",
        "iran",
        "israel",
        "oil",
        "war",
        "strike",
        "sanctions",
        "sec",
        "etf",
        "binance",
        "coinbase",
        "hack"
      ],
      HIGH_WINDOW_MIN: 90,
      MEDIUM_WINDOW_MIN: 240
    };

    // Обновляй этот список вручную.
    // Формат времени: UTC
    const MANUAL_MACRO_EVENTS = [
      { title: "US CPI", datetime: "2026-03-20T12:30:00Z", impact: "HIGH" },
      { title: "FOMC Rate Decision", datetime: "2026-03-25T18:00:00Z", impact: "HIGH" },
      { title: "Powell Speech", datetime: "2026-03-25T18:30:00Z", impact: "HIGH" },
      { title: "Non-Farm Payrolls", datetime: "2026-04-03T12:30:00Z", impact: "HIGH" },
      { title: "PCE", datetime: "2026-03-27T12:30:00Z", impact: "HIGH" },
      { title: "PPI", datetime: "2026-03-21T12:30:00Z", impact: "MEDIUM" },
      { title: "Retail Sales", datetime: "2026-03-22T12:30:00Z", impact: "MEDIUM" },
      { title: "Jobless Claims", datetime: "2026-03-19T12:30:00Z", impact: "MEDIUM" }
    ];

    const appStatus = document.getElementById("appStatus");
    const topCards = document.getElementById("topCards");
    const coinCards = document.getElementById("coinCards");
    const refreshBtn = document.getElementById("refreshBtn");
    const toggleBtn = document.getElementById("toggleBtn");
    const intervalSelect = document.getElementById("intervalSelect");

    let timer = null;

    let dominanceCache = {
      data: null,
      lastFetchTs: 0,
      baseline: null
    };

    let eventCache = {
      poly: { data: null, ts: 0 }
    };

    function modeClass(state, direction){
      if (state === "TREND") return direction === "UP" ? "up" : "down";
      if (state === "CHAOS") return "chaos";
      return "range";
    }

    function modeText(state, direction){
      if (state === "TREND") return `TREND ${direction}`;
      return state;
    }

    function clamp(value, min, max){
      return Math.max(min, Math.min(max, value));
    }

    function formatArrow(delta){
      if (delta == null) return "—";
      if (delta > 0.0001) return "↑";
      if (delta < -0.0001) return "↓";
      return "→";
    }

    function normalizeText(s){
      return String(s || "").toLowerCase();
    }

    function containsAny(text, keywords){
      const t = normalizeText(text);
      return keywords.some(k => t.includes(k.toLowerCase()));
    }

    function minutesUntil(dateStr){
      const target = new Date(dateStr).getTime();
      const now = Date.now();
      return (target - now) / (1000 * 60);
    }

    function classify(candles){
      const dirs = [];
      const opens = [];
      const closes = [];
      const wickRatios = [];

      for (const c of candles){
        const o = Number(c[1]);
        const h = Number(c[2]);
        const l = Number(c[3]);
        const cl = Number(c[4]);

        const body = Math.abs(cl - o);
        const totalRange = h - l;
        const wick = Math.max(0, totalRange - body);

        let ratio = body > 0 ? wick / body : 10;
        ratio = Math.min(ratio, 10);
        wickRatios.push(ratio);

        opens.push(o);
        closes.push(cl);

        if (cl > o) dirs.push(1);
        else if (cl < o) dirs.push(-1);
        else dirs.push(0);
      }

      let maxRun = 1;
      let curRun = 1;
      for (let i = 1; i < dirs.length; i++){
        if (dirs[i] !== 0 && dirs[i] === dirs[i - 1]){
          curRun++;
          maxRun = Math.max(maxRun, curRun);
        } else {
          curRun = 1;
        }
      }

      let changes = 0;
      let prev = null;
      let upCount = 0;
      let downCount = 0;

      for (const d of dirs){
        if (d === 1) upCount++;
        else if (d === -1) downCount++;

        if (d === 0) continue;
        if (prev !== null && d !== prev) changes++;
        prev = d;
      }

      const n = candles.length;
      const firstOpen = opens[0];
      const lastClose = closes[closes.length - 1];
      const netMove = Math.abs(lastClose / firstOpen - 1);
      const direction = lastClose >= firstOpen ? "UP" : "DOWN";

      const dominantShare = Math.max(upCount, downCount) / Math.max(1, (upCount + downCount));
      const avgWickRatio = wickRatios.reduce((a,b)=>a+b,0) / wickRatios.length;

      const trend = (
        maxRun >= 4 &&
        netMove >= 0.0035 &&
        changes <= Math.floor(n * 0.30) &&
        dominantShare >= 0.65 &&
        avgWickRatio <= 1.8
      );

      const chaos = (
        maxRun <= 2 &&
        changes >= Math.floor(n * 0.55) &&
        netMove < 0.0025 &&
        dominantShare <= 0.58 &&
        avgWickRatio >= 1.8
      );

      let state = "RANGE";
      if (trend) state = "TREND";
      else if (chaos) state = "CHAOS";

      const predictorSignals = [];
      if (maxRun <= 3) predictorSignals.push("серии короткие");
      if (changes >= Math.floor(n * 0.45)) predictorSignals.push("много разворотов");
      if (dominantShare < 0.62) predictorSignals.push("нет доминирования");
      if (avgWickRatio > 1.6) predictorSignals.push("грязные свечи");
      if (netMove < 0.0030) predictorSignals.push("слабый net move");

      let chaosRisk = "LOW";
      if (predictorSignals.length >= 4) chaosRisk = "HIGH";
      else if (predictorSignals.length >= 2) chaosRisk = "MEDIUM";

      return {
        state,
        direction,
        price: lastClose,
        maxRun,
        changes,
        netMovePct: (netMove * 100).toFixed(3),
        netMoveRaw: netMove,
        avgWickRatio: avgWickRatio.toFixed(2),
        avgWickRatioRaw: avgWickRatio,
        dominantShare: (dominantShare * 100).toFixed(0),
        dominantShareRaw: dominantShare,
        chaosRisk,
        predictorSignals,
        window: n
      };
    }

    function localDecision(coin){
      if (coin.state === "CHAOS") {
        return { text:"LOCAL SKIP", cls:"skip", reason:"сама монета в хаосе" };
      }
      if (coin.chaosRisk === "HIGH") {
        return { text:"LOCAL SKIP", cls:"skip", reason:"у монеты высокий риск хаоса" };
      }
      if (coin.state === "TREND") {
        return { text:`LOCAL ALLOW ${coin.direction}`, cls:"allow", reason:"сама монета даёт тренд" };
      }
      if (coin.state === "RANGE" && coin.chaosRisk === "LOW") {
        return { text:"LOCAL CAUTION", cls:"caution", reason:"монета в range без сильной деградации" };
      }
      return { text:"LOCAL SKIP", cls:"skip", reason:"локально edge слабый" };
    }

    function btcAwareDecision(btc, coin){
      if (btc.state === "CHAOS") {
        return { text:"BTC FILTER: SKIP", cls:"skip", reason:"BTC в хаосе" };
      }
      if (btc.chaosRisk === "HIGH") {
        return { text:"BTC FILTER: SKIP", cls:"skip", reason:"BTC близок к хаосу" };
      }
      if (coin.state === "CHAOS") {
        return { text:"BTC FILTER: SKIP", cls:"skip", reason:"монета в хаосе" };
      }
      if (coin.chaosRisk === "HIGH") {
        return { text:"BTC FILTER: SKIP", cls:"skip", reason:"монета деградирует" };
      }
      if (btc.state === "TREND" && coin.state === "TREND" && btc.direction === coin.direction) {
        return { text:`BTC FILTER: ALLOW ${coin.direction}`, cls:"allow", reason:"BTC и монета согласованы" };
      }
      if (btc.state === "TREND" && coin.state === "TREND" && btc.direction !== coin.direction) {
        return { text:"BTC FILTER: CAUTION", cls:"caution", reason:"монета против BTC" };
      }
      if (btc.state === "RANGE" || coin.state === "RANGE") {
        return { text:"BTC FILTER: CAUTION", cls:"caution", reason:"переходный режим" };
      }
      return { text:"BTC FILTER: SKIP", cls:"skip", reason:"нет edge" };
    }

    async function fetchDominanceData(){
      const now = Date.now();

      if (dominanceCache.data && now - dominanceCache.lastFetchTs < SETTINGS.DOMINANCE_REFRESH_MS) {
        return dominanceCache.data;
      }

      const [globalRes, tetherRes] = await Promise.all([
        fetch("https://api.coingecko.com/api/v3/global", { cache: "no-store" }),
        fetch("https://api.coingecko.com/api/v3/coins/tether?localization=false&tickers=false&market_data=true&community_data=false&developer_data=false&sparkline=false", { cache: "no-store" })
      ]);

      if (!globalRes.ok) throw new Error(`CoinGecko global: ${globalRes.status}`);
      if (!tetherRes.ok) throw new Error(`CoinGecko tether: ${tetherRes.status}`);

      const globalJson = await globalRes.json();
      const tetherJson = await tetherRes.json();

      const totalMcap = globalJson?.data?.total_market_cap?.usd;
      const btcDom = globalJson?.data?.market_cap_percentage?.btc;
      const usdtMcap = tetherJson?.market_data?.market_cap?.usd;

      if (!totalMcap || !btcDom || !usdtMcap) {
        throw new Error("не удалось получить dominance data");
      }

      const usdtDom = (usdtMcap / totalMcap) * 100;

      if (!dominanceCache.baseline) {
        dominanceCache.baseline = {
          btcDom,
          usdtDom,
          ts: now
        };
      }

      const btcDelta = btcDom - dominanceCache.baseline.btcDom;
      const usdtDelta = usdtDom - dominanceCache.baseline.usdtDom;

      const data = {
        btcDom,
        usdtDom,
        btcDelta,
        usdtDelta,
        btcArrow: formatArrow(btcDelta),
        usdtArrow: formatArrow(usdtDelta),
        baselineTs: dominanceCache.baseline.ts
      };

      dominanceCache.data = data;
      dominanceCache.lastFetchTs = now;
      return data;
    }

    async function fetchPolymarketRisk(){
      const now = Date.now();
      if (eventCache.poly.data && now - eventCache.poly.ts < EVENT_SETTINGS.POLY_REFRESH_MS) {
        return eventCache.poly.data;
      }

      const url = "https://gamma-api.polymarket.com/events?active=true&closed=false&limit=100";
      const r = await fetch(url, { cache: "no-store" });
      if (!r.ok) throw new Error(`Polymarket: ${r.status}`);

      const events = await r.json();
      const matched = [];

      for (const ev of events) {
        const title = ev.title || ev.slug || "";
        const description = ev.description || "";
        const endDate = ev.endDate || ev.end_date || ev.endDateIso || ev.end_time || null;
        const text = `${title} ${description}`;

        if (!containsAny(text, EVENT_SETTINGS.POLY_KEYWORDS)) continue;

        const mins = endDate ? minutesUntil(endDate) : null;
        matched.push({ title, endDate, mins });
      }

      let score = 0;
      const reasons = [];

      const veryNear = matched.filter(x => x.mins !== null && x.mins >= 0 && x.mins <= EVENT_SETTINGS.HIGH_WINDOW_MIN);
      const near = matched.filter(x => x.mins !== null && x.mins > EVENT_SETTINGS.HIGH_WINDOW_MIN && x.mins <= EVENT_SETTINGS.MEDIUM_WINDOW_MIN);

      if (veryNear.length >= 1) {
        score += 45;
        reasons.push(`Polymarket: близкие event markets (${veryNear.length})`);
      } else if (near.length >= 1) {
        score += 20;
        reasons.push(`Polymarket: события сегодня (${near.length})`);
      }

      if (matched.length >= 5) {
        score += 20;
        reasons.push(`Polymarket: много активных risk markets (${matched.length})`);
      } else if (matched.length >= 2) {
        score += 10;
        reasons.push(`Polymarket: есть risk markets (${matched.length})`);
      }

      score = Math.min(score, 100);

      let level = "LOW";
      let cls = "allow";
      if (score >= 50) {
        level = "HIGH";
        cls = "skip";
      } else if (score >= 20) {
        level = "MEDIUM";
        cls = "caution";
      }

      const data = {
        source: "Polymarket",
        level,
        cls,
        score,
        reasons: reasons.length ? reasons : ["Polymarket risk markets не давят"],
        matched: matched.slice(0, 10)
      };

      eventCache.poly = { data, ts: now };
      return data;
    }

    function fetchEconomicCalendarRiskNoKey(){
      const upcoming = [];

      for (const ev of MANUAL_MACRO_EVENTS) {
        const mins = minutesUntil(ev.datetime);
        if (mins < 0) continue;

        upcoming.push({
          event: ev.title,
          date: ev.datetime,
          mins,
          impact: ev.impact
        });
      }

      upcoming.sort((a, b) => a.mins - b.mins);

      let score = 0;
      const reasons = [];

      const highSoon = upcoming.filter(x => x.impact === "HIGH" && x.mins <= 90);
      const highToday = upcoming.filter(x => x.impact === "HIGH" && x.mins > 90 && x.mins <= 240);
      const medSoon = upcoming.filter(x => x.impact === "MEDIUM" && x.mins <= 90);

      if (highSoon.length >= 1) {
        score += 60;
        reasons.push(`calendar: high-impact скоро (${highSoon[0].event})`);
      } else if (highToday.length >= 1) {
        score += 30;
        reasons.push(`calendar: high-impact сегодня (${highToday[0].event})`);
      }

      if (medSoon.length >= 1) {
        score += 15;
        reasons.push(`calendar: medium-impact скоро (${medSoon[0].event})`);
      }

      score = Math.min(score, 100);

      let level = "LOW";
      let cls = "allow";

      if (score >= 50) {
        level = "HIGH";
        cls = "skip";
      } else if (score >= 20) {
        level = "MEDIUM";
        cls = "caution";
      }

      return {
        source: "Manual Calendar",
        level,
        cls,
        score,
        reasons: reasons.length ? reasons : ["ближайших сильных релизов не задано"],
        upcoming: upcoming.slice(0, 10)
      };
    }

    function computeDominanceRisk(dom){
      if (!dom) {
        return {
          level: "UNKNOWN",
          cls: "caution",
          score: 20,
          reasons: ["нет dominance data"]
        };
      }

      const reasons = [];
      let score = 0;

      if (dom.usdtDelta >= SETTINGS.USDT_DOM_HIGH_DELTA) {
        score += 45;
        reasons.push(`USDT.D сильно растёт (${dom.usdtDelta.toFixed(2)} п.п.)`);
      } else if (dom.usdtDelta >= SETTINGS.USDT_DOM_MEDIUM_DELTA) {
        score += 25;
        reasons.push(`USDT.D растёт (${dom.usdtDelta.toFixed(2)} п.п.)`);
      }

      if (dom.btcDelta >= SETTINGS.BTC_DOM_HIGH_DELTA) {
        score += 30;
        reasons.push(`BTC.D сильно растёт (${dom.btcDelta.toFixed(2)} п.п.)`);
      } else if (dom.btcDelta >= SETTINGS.BTC_DOM_MEDIUM_DELTA) {
        score += 15;
        reasons.push(`BTC.D растёт (${dom.btcDelta.toFixed(2)} п.п.)`);
      }

      let level = "LOW";
      let cls = "allow";
      if (score >= 50) {
        level = "HIGH";
        cls = "skip";
      } else if (score >= 20) {
        level = "MEDIUM";
        cls = "caution";
      }

      return {
        level,
        cls,
        score: Math.min(score, 100),
        reasons: reasons.length ? reasons : ["dominance спокойная"]
      };
    }

    function combineExternalEventRisk(polyRisk, calRisk){
      const score = Math.max(polyRisk?.score || 0, calRisk?.score || 0);
      const reasons = [
        ...(polyRisk?.reasons || []),
        ...(calRisk?.reasons || [])
      ];

      let level = "LOW";
      let cls = "allow";

      if ((polyRisk && polyRisk.level === "HIGH") || (calRisk && calRisk.level === "HIGH") || score >= 50) {
        level = "HIGH";
        cls = "skip";
      } else if ((polyRisk && polyRisk.level === "MEDIUM") || (calRisk && calRisk.level === "MEDIUM") || score >= 20) {
        level = "MEDIUM";
        cls = "caution";
      }

      return {
        level,
        cls,
        score,
        reasons: reasons.length ? reasons : ["external event risk низкий"],
        polyRisk,
        calRisk
      };
    }

    function computeTechnicalChaos(btc){
      let score = 0;
      const reasons = [];

      if (btc.state === "CHAOS") {
        score += 40;
        reasons.push("BTC = CHAOS");
      }
      if (btc.chaosRisk === "HIGH") {
        score += 30;
        reasons.push("BTC chaos risk = HIGH");
      } else if (btc.chaosRisk === "MEDIUM") {
        score += 15;
        reasons.push("BTC chaos risk = MEDIUM");
      }

      if (btc.changes > btc.window * 0.45) {
        score += 20;
        reasons.push("слишком много разворотов");
      } else if (btc.changes > btc.window * 0.35) {
        score += 10;
        reasons.push("разворотов выше нормы");
      }

      if (btc.dominantShareRaw < 0.58) {
        score += 20;
        reasons.push("нет доминирования");
      } else if (btc.dominantShareRaw < 0.62) {
        score += 10;
        reasons.push("слабое доминирование");
      }

      if (btc.avgWickRatioRaw > 2.5) {
        score += 20;
        reasons.push("грязные свечи");
      } else if (btc.avgWickRatioRaw > 1.8) {
        score += 10;
        reasons.push("тени выше нормы");
      }

      if (btc.maxRun < 3) {
        score += 15;
        reasons.push("нет серии");
      }

      if (btc.netMoveRaw < 0.0025) {
        score += 15;
        reasons.push("нет импульса");
      }

      score = clamp(score, 0, 100);

      let level = "LOW";
      let cls = "allow";
      if (score >= 60) {
        level = "HIGH";
        cls = "skip";
      } else if (score >= 30) {
        level = "MEDIUM";
        cls = "caution";
      }

      return { level, cls, score, reasons };
    }

    function computeFinalEventRisk(dominanceRisk, externalRisk){
      const score = Math.max(dominanceRisk.score || 0, externalRisk.score || 0);
      const reasons = [
        ...(dominanceRisk.reasons || []),
        ...(externalRisk.reasons || [])
      ];

      let level = "LOW";
      let cls = "allow";

      if (dominanceRisk.level === "HIGH" || externalRisk.level === "HIGH" || score >= 50) {
        level = "HIGH";
        cls = "skip";
      } else if (dominanceRisk.level === "MEDIUM" || externalRisk.level === "MEDIUM" || score >= 20) {
        level = "MEDIUM";
        cls = "caution";
      }

      return {
        level,
        cls,
        score,
        reasons,
        polyRisk: externalRisk.polyRisk,
        calRisk: externalRisk.calRisk
      };
    }

    function computeFinalChaos(technical, eventRisk){
      const reasons = [...technical.reasons, ...eventRisk.reasons];
      const score = clamp(Math.max(technical.score, eventRisk.score), 0, 100);

      let level = "LOW";
      let cls = "allow";

      if (technical.level === "HIGH" || eventRisk.level === "HIGH" || score >= 60) {
        level = "HIGH";
        cls = "skip";
      } else if (technical.level === "MEDIUM" || eventRisk.level === "MEDIUM" || score >= 30) {
        level = "MEDIUM";
        cls = "caution";
      }

      return { level, cls, score, reasons };
    }

    function marketGate(finalChaos){
      if (finalChaos.level === "HIGH") {
        return {
          text: "DO NOT START",
          cls: "skip",
          reason: finalChaos.reasons.join(" · ")
        };
      }
      if (finalChaos.level === "MEDIUM") {
        return {
          text: "CAUTION",
          cls: "caution",
          reason: finalChaos.reasons.join(" · ")
        };
      }
      return {
        text: "START OK",
        cls: "allow",
        reason: "хаос низкий, рынок достаточно чистый"
      };
    }

    function renderTop(btc, data, dom, technical, eventRisk, finalChaos, gate){
      const localTradable = data.filter(
        x => x.symbol !== "BTCUSDT" && x.local.text.startsWith("LOCAL ALLOW")
      );
      const btcTradable = data.filter(
        x => x.symbol !== "BTCUSDT" && x.btcAware.text.startsWith("BTC FILTER: ALLOW")
      );

      const gateBoxClass =
        gate.cls === "allow" ? "okbox" :
        gate.cls === "caution" ? "warnbox" : "dangerbox";

      const polyText = eventRisk.polyRisk
        ? `${eventRisk.polyRisk.level} · ${eventRisk.polyRisk.reasons.join(" · ")}`
        : "нет данных";

      const calText = eventRisk.calRisk
        ? `${eventRisk.calRisk.level} · ${eventRisk.calRisk.reasons.join(" · ")}`
        : "нет данных";

      topCards.innerHTML = `
        <div class="card">
          <div class="headline">
            <div>
              <div class="label">Финальный gate для cbit</div>
              <div class="gate ${gate.cls}">${gate.text}</div>
            </div>
            <div style="text-align:right">
              <div class="label">Итоговый уровень хаоса</div>
              <div class="chaosLevel ${finalChaos.cls}">${finalChaos.level}</div>
            </div>
          </div>

          <div class="${gateBoxClass}">
            <div class="label">Причина решения</div>
            <div class="mini">${gate.reason}</div>
          </div>

          <div class="split3" style="margin-top:12px;">
            <div class="card" style="padding:12px;border-radius:18px;background:rgba(22,38,75,0.85)">
              <div class="label">Technical chaos</div>
              <div class="big ${technical.cls}" style="margin-top:6px;">${technical.level}</div>
              <div class="mini">score: ${technical.score}/100</div>
              <div class="mini">${technical.reasons.length ? technical.reasons.join(" · ") : "структура чистая"}</div>
            </div>

            <div class="card" style="padding:12px;border-radius:18px;background:rgba(22,38,75,0.85)">
              <div class="label">Event risk</div>
              <div class="big ${eventRisk.cls}" style="margin-top:6px;">${eventRisk.level}</div>
              <div class="mini">score: ${eventRisk.score}/100</div>
              <div class="mini">${eventRisk.reasons.length ? eventRisk.reasons.join(" · ") : "внешний фон спокойный"}</div>
            </div>

            <div class="card" style="padding:12px;border-radius:18px;background:rgba(22,38,75,0.85)">
              <div class="label">Final chaos</div>
              <div class="big ${finalChaos.cls}" style="margin-top:6px;">${finalChaos.level}</div>
              <div class="mini">score: ${finalChaos.score}/100</div>
              <div class="mini">используй это как главный индикатор запуска cbit</div>
            </div>
          </div>

          <div class="split3" style="margin-top:12px;">
            <div class="card" style="padding:12px;border-radius:18px;background:rgba(22,38,75,0.85)">
              <div class="label">BTC.D</div>
              <div class="big ${dom && dom.btcDelta > 0 ? "range" : dom && dom.btcDelta < 0 ? "up" : "caution"}" style="margin-top:6px;">
                ${dom ? `${dom.btcDom.toFixed(2)}% ${dom.btcArrow}` : "—"}
              </div>
              <div class="mini">${dom ? `session delta: ${dom.btcDelta.toFixed(2)} п.п.` : "нет данных"}</div>
            </div>

            <div class="card" style="padding:12px;border-radius:18px;background:rgba(22,38,75,0.85)">
              <div class="label">USDT.D</div>
              <div class="big ${dom && dom.usdtDelta > 0 ? "chaos" : dom && dom.usdtDelta < 0 ? "up" : "caution"}" style="margin-top:6px;">
                ${dom ? `${dom.usdtDom.toFixed(2)}% ${dom.usdtArrow}` : "—"}
              </div>
              <div class="mini">${dom ? `session delta: ${dom.usdtDelta.toFixed(2)} п.п.` : "нет данных"}</div>
            </div>

            <div class="card" style="padding:12px;border-radius:18px;background:rgba(22,38,75,0.85)">
              <div class="label">Dominance logic</div>
              <div class="mini">
                BTC.D ↑ = альты слабее<br/>
                USDT.D ↑ = risk-off / деньги в кэш
              </div>
            </div>
          </div>

          <div class="split" style="margin-top:12px">
            <div class="card" style="padding:12px;border-radius:18px;background:rgba(22,38,75,0.85)">
              <div class="label">Polymarket risk</div>
              <div class="mini">${polyText}</div>
            </div>

            <div class="card" style="padding:12px;border-radius:18px;background:rgba(22,38,75,0.85)">
              <div class="label">Manual macro calendar risk</div>
              <div class="mini">${calText}</div>
            </div>
          </div>

          <div class="split" style="margin-top:12px">
            <div class="card" style="padding:12px;border-radius:18px;background:rgba(22,38,75,0.85)">
              <div class="label">BTC как глобальный фильтр</div>
              <div class="big ${modeClass(btc.state, btc.direction)}" style="margin-top:6px;">${modeText(btc.state, btc.direction)}</div>
              <div class="mini">
                net move: ${btc.netMovePct}% · run: ${btc.maxRun} · changes: ${btc.changes} ·
                dominance: ${btc.dominantShare}% · wick/body: ${btc.avgWickRatio}
              </div>
            </div>

            <div class="card" style="padding:12px;border-radius:18px;background:rgba(22,38,75,0.85)">
              <div class="label">Отдельно по монетам</div>
              <div class="mini">${localTradable.length ? localTradable.map(x => x.symbol.replace("USDT","")).join(", ") : "нет явных локальных трендов"}</div>
              <div class="label" style="margin-top:10px;">С учётом BTC</div>
              <div class="mini">${btcTradable.length ? btcTradable.map(x => x.symbol.replace("USDT","")).join(", ") : "ничего не подтверждено BTC"}</div>
            </div>
          </div>

          ${btc.predictorSignals.length ? `
            <div class="warnbox">
              <div class="label">Сигналы деградации BTC</div>
              <div class="mini">${btc.predictorSignals.join(" · ")}</div>
            </div>
          ` : ``}
        </div>
      `;
    }

    function renderCoins(data){
      coinCards.innerHTML = "";

      data
        .filter(x => x.symbol !== "BTCUSDT")
        .forEach(item => {
          const warningBox = item.predictorSignals.length
            ? `
              <div class="${item.chaosRisk === 'HIGH' ? 'dangerbox' : 'warnbox'}">
                <div class="label">Предиктор хаоса монеты</div>
                <div class="mini">${item.chaosRisk} · ${item.predictorSignals.join(" · ")}</div>
              </div>
            `
            : "";

          const btcBoxClass =
            item.btcAware.cls === "skip" ? "dangerbox" :
            item.btcAware.cls === "caution" ? "warnbox" : "infobox";

          const div = document.createElement("div");
          div.className = "card";
          div.innerHTML = `
            <div class="headline">
              <div class="coin">${item.symbol.replace("USDT","")}</div>
              <div class="price">${item.price.toFixed(item.symbol === "XRPUSDT" ? 4 : 2)}</div>
            </div>

            <div class="mode ${modeClass(item.state, item.direction)}">${modeText(item.state, item.direction)}</div>
            <div class="meta">
              <span>net move: ${item.netMovePct}%</span>
              <span>run: ${item.maxRun}</span>
              <span>changes: ${item.changes}</span>
              <span>dominance: ${item.dominantShare}%</span>
              <span>wick/body: ${item.avgWickRatio}</span>
            </div>

            <div class="infobox">
              <div class="label">Отдельно по монете</div>
              <div class="localDecision ${item.local.cls}">${item.local.text}</div>
              <div class="mini">${item.local.reason}</div>
            </div>

            <div class="${btcBoxClass}">
              <div class="label">С учётом BTC</div>
              <div class="decision ${item.btcAware.cls}">${item.btcAware.text}</div>
              <div class="mini">${item.btcAware.reason}</div>
            </div>

            ${warningBox}
          `;
          coinCards.appendChild(div);
        });
    }

    async function loadOne(symbol){
      const url = `https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=1m&limit=${LOOKBACK}`;
      const r = await fetch(url, { cache:"no-store" });
      if (!r.ok) throw new Error(`${symbol}: ${r.status}`);
      const candles = await r.json();
      const x = classify(candles);
      x.symbol = symbol;
      return x;
    }

    async function refreshAll(){
      appStatus.textContent = "Loading...";
      try{
        const [data, dom, polyRisk] = await Promise.all([
          Promise.all(SYMBOLS.map(loadOne)),
          fetchDominanceData().catch(() => null),
          fetchPolymarketRisk().catch(() => ({
            source: "Polymarket",
            level: "UNKNOWN",
            cls: "caution",
            score: 20,
            reasons: ["ошибка Polymarket"],
            matched: []
          }))
        ]);

        const calRisk = fetchEconomicCalendarRiskNoKey();
        const btc = data.find(x => x.symbol === "BTCUSDT");

        data.forEach(x => {
          x.local = localDecision(x);
          x.btcAware = btc.symbol === x.symbol
            ? { text:"—", cls:"caution", reason:"это сам BTC" }
            : btcAwareDecision(btc, x);
        });

        const technical = computeTechnicalChaos(btc);
        const dominanceRisk = computeDominanceRisk(dom);
        const externalRisk = combineExternalEventRisk(polyRisk, calRisk);
        const eventRisk = computeFinalEventRisk(dominanceRisk, externalRisk);
        const finalChaos = computeFinalChaos(technical, eventRisk);
        const gate = marketGate(finalChaos);

        renderTop(btc, data, dom, technical, eventRisk, finalChaos, gate);
        renderCoins(data);

        appStatus.textContent = `Updated ${new Date().toLocaleTimeString()} · window ${LOOKBACK}m`;
      } catch (e){
        appStatus.textContent = `Ошибка загрузки: ${e.message}`;
      }
    }

    function startAuto(){
      stopAuto();
      refreshAll();
      timer = setInterval(refreshAll, Number(intervalSelect.value));
      toggleBtn.textContent = "Stop";
    }

    function stopAuto(){
      if (timer){
        clearInterval(timer);
        timer = null;
      }
      toggleBtn.textContent = "Start";
    }

    refreshBtn.addEventListener("click", refreshAll);

    toggleBtn.addEventListener("click", () => {
      if (timer){
        stopAuto();
        appStatus.textContent = "Stopped";
      } else {
        startAuto();
      }
    });

    intervalSelect.addEventListener("change", () => {
      if (timer) startAuto();
    });

    refreshAll();
  </script>
</body>
</html>
