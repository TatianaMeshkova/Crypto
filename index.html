<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Crypto Decision Terminal Final + Dominance</title>
  <style>
    :root{
      --bg:#071226;
      --panel:#0f1d3a;
      --panel2:#16264b;
      --text:#eaf0ff;
      --muted:#9fb0d9;
      --ok:#17c964;
      --warn:#f5a524;
      --bad:#f31260;
      --border:#243b73;
      --btn:#79aaff;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
      background:linear-gradient(180deg,#06101f 0%, #0a1831 100%);
      color:var(--text);
      padding:18px 14px 28px;
    }
    .wrap{
      max-width:980px;
      margin:0 auto;
    }
    h1{
      margin:8px 0 6px;
      font-size:34px;
      line-height:1.04;
      font-weight:800;
      letter-spacing:-0.03em;
    }
    .sub{
      color:var(--muted);
      font-size:18px;
      margin-bottom:16px;
    }
    .toolbar{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:10px;
    }
    button, select{
      border:none;
      border-radius:16px;
      padding:14px 16px;
      font-size:18px;
      font-weight:700;
    }
    button{
      background:var(--btn);
      color:#081427;
      min-width:120px;
    }
    select{
      background:var(--panel2);
      color:var(--text);
      border:1px solid var(--border);
    }
    .status{
      font-size:16px;
      color:var(--muted);
      margin:4px 0 14px;
    }
    .sectionTitle{
      font-size:20px;
      font-weight:800;
      margin:18px 0 10px;
    }
    .topgrid, .grid{
      display:grid;
      grid-template-columns:1fr;
      gap:12px;
    }
    .card{
      background:rgba(15,29,58,0.95);
      border:1px solid var(--border);
      border-radius:22px;
      padding:16px;
      box-shadow:0 10px 25px rgba(0,0,0,0.16);
    }
    .headline{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
    }
    .coin{
      font-size:26px;
      font-weight:800;
    }
    .price{
      font-size:20px;
      font-weight:700;
    }
    .mode{
      font-size:22px;
      font-weight:800;
      margin-top:10px;
    }
    .decision{
      font-size:20px;
      font-weight:800;
      margin-top:8px;
    }
    .localDecision{
      font-size:18px;
      font-weight:800;
      margin-top:6px;
    }
    .gate{
      font-size:28px;
      font-weight:900;
      margin-top:6px;
    }
    .up{color:var(--ok)}
    .down{color:var(--bad)}
    .range{color:var(--warn)}
    .chaos{color:var(--bad)}
    .allow{color:var(--ok)}
    .caution{color:var(--warn)}
    .skip{color:var(--bad)}
    .meta{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      color:var(--muted);
      font-size:14px;
      margin-top:10px;
    }
    .label{
      color:var(--muted);
      font-size:14px;
    }
    .big{
      font-size:24px;
      font-weight:800;
    }
    .mini{
      font-size:15px;
      color:var(--muted);
      margin-top:8px;
      line-height:1.4;
    }
    .split{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }
    .split3{
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:12px;
    }
    .warnbox, .dangerbox, .infobox, .okbox{
      border-radius:18px;
      padding:12px;
      margin-top:10px;
    }
    .warnbox{
      border:1px solid rgba(245,165,36,0.35);
      background:rgba(245,165,36,0.08);
    }
    .dangerbox{
      border:1px solid rgba(243,18,96,0.35);
      background:rgba(243,18,96,0.08);
    }
    .infobox{
      border:1px solid rgba(121,170,255,0.35);
      background:rgba(121,170,255,0.08);
    }
    .okbox{
      border:1px solid rgba(23,201,100,0.35);
      background:rgba(23,201,100,0.08);
    }
    @media (max-width:880px){
      .split3{
        grid-template-columns:1fr;
      }
    }
    @media (max-width:640px){
      .split{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Crypto Decision Terminal</h1>
    <div class="sub">BTC • ETH • SOL • XRP • 1m candles • строгое окно 30 минут • BTC.D / USDT.D</div>

    <div class="toolbar">
      <button id="refreshBtn">Refresh</button>
      <button id="toggleBtn">Start</button>
      <select id="intervalSelect">
        <option value="10000">10 sec</option>
        <option value="15000" selected>15 sec</option>
        <option value="30000">30 sec</option>
        <option value="60000">60 sec</option>
      </select>
    </div>

    <div id="appStatus" class="status">Stopped</div>

    <div class="topgrid" id="topCards"></div>

    <div class="sectionTitle">BTC filter + монеты</div>
    <div class="grid" id="coinCards"></div>
  </div>

  <script>
    const SYMBOLS = ["BTCUSDT", "ETHUSDT", "SOLUSDT", "XRPUSDT"];
    const LOOKBACK = 30;

    const SETTINGS = {
      DOMINANCE_REFRESH_MS: 60000,
      USDT_DOM_NO_TRADE_DELTA: 0.08,   // процентных пункта от baseline
      BTC_DOM_SPIKE_DELTA: 0.12        // процентных пункта от baseline
    };

    const appStatus = document.getElementById("appStatus");
    const topCards = document.getElementById("topCards");
    const coinCards = document.getElementById("coinCards");
    const refreshBtn = document.getElementById("refreshBtn");
    const toggleBtn = document.getElementById("toggleBtn");
    const intervalSelect = document.getElementById("intervalSelect");

    let timer = null;

    let dominanceCache = {
      data: null,
      lastFetchTs: 0,
      baseline: null
    };

    function modeClass(state, direction){
      if (state === "TREND") return direction === "UP" ? "up" : "down";
      if (state === "CHAOS") return "chaos";
      return "range";
    }

    function modeText(state, direction){
      if (state === "TREND") return `TREND ${direction}`;
      return state;
    }

    function formatArrow(delta){
      if (delta == null) return "—";
      if (delta > 0.0001) return "↑";
      if (delta < -0.0001) return "↓";
      return "→";
    }

    function classify(candles){
      const dirs = [];
      const opens = [];
      const closes = [];
      const wickRatios = [];

      for (const c of candles){
        const o = Number(c[1]);
        const h = Number(c[2]);
        const l = Number(c[3]);
        const cl = Number(c[4]);

        const body = Math.abs(cl - o);
        const totalRange = h - l;
        const wick = Math.max(0, totalRange - body);
        wickRatios.push(body > 0 ? wick / body : 99);

        opens.push(o);
        closes.push(cl);

        if (cl > o) dirs.push(1);
        else if (cl < o) dirs.push(-1);
        else dirs.push(0);
      }

      let maxRun = 1;
      let curRun = 1;
      for (let i = 1; i < dirs.length; i++){
        if (dirs[i] !== 0 && dirs[i] === dirs[i-1]){
          curRun++;
          maxRun = Math.max(maxRun, curRun);
        } else {
          curRun = 1;
        }
      }

      let changes = 0;
      let prev = null;
      let upCount = 0;
      let downCount = 0;

      for (const d of dirs){
        if (d === 1) upCount++;
        else if (d === -1) downCount++;

        if (d === 0) continue;
        if (prev !== null && d !== prev) changes++;
        prev = d;
      }

      const n = candles.length;
      const firstOpen = opens[0];
      const lastClose = closes[closes.length - 1];
      const netMove = Math.abs(lastClose / firstOpen - 1);
      const direction = lastClose >= firstOpen ? "UP" : "DOWN";

      const dominantShare = Math.max(upCount, downCount) / Math.max(1, (upCount + downCount));
      const avgWickRatio = wickRatios.reduce((a,b)=>a+b,0) / wickRatios.length;

      const trend = (
        maxRun >= 4 &&
        netMove >= 0.0035 &&
        changes <= Math.floor(n * 0.30) &&
        dominantShare >= 0.65 &&
        avgWickRatio <= 1.8
      );

      const chaos = (
        maxRun <= 2 &&
        changes >= Math.floor(n * 0.55) &&
        netMove < 0.0025 &&
        dominantShare <= 0.58 &&
        avgWickRatio >= 1.8
      );

      let state = "RANGE";
      if (trend) state = "TREND";
      else if (chaos) state = "CHAOS";

      const predictorSignals = [];
      if (maxRun <= 3) predictorSignals.push("серии короткие");
      if (changes >= Math.floor(n * 0.45)) predictorSignals.push("много разворотов");
      if (dominantShare < 0.62) predictorSignals.push("нет доминирования");
      if (avgWickRatio > 1.6) predictorSignals.push("грязные свечи");
      if (netMove < 0.0030) predictorSignals.push("слабый net move");

      let chaosRisk = "LOW";
      if (predictorSignals.length >= 4) chaosRisk = "HIGH";
      else if (predictorSignals.length >= 2) chaosRisk = "MEDIUM";

      return {
        state,
        direction,
        price: lastClose,
        maxRun,
        changes,
        netMovePct: (netMove * 100).toFixed(3),
        netMoveRaw: netMove,
        avgWickRatio: avgWickRatio.toFixed(2),
        avgWickRatioRaw: avgWickRatio,
        dominantShare: (dominantShare * 100).toFixed(0),
        dominantShareRaw: dominantShare,
        chaosRisk,
        predictorSignals,
        window: n
      };
    }

    function localDecision(coin){
      if (coin.state === "CHAOS") {
        return { text:"LOCAL SKIP", cls:"skip", reason:"сама монета в хаосе" };
      }
      if (coin.chaosRisk === "HIGH") {
        return { text:"LOCAL SKIP", cls:"skip", reason:"у монеты высокий риск хаоса" };
      }
      if (coin.state === "TREND") {
        return { text:`LOCAL ALLOW ${coin.direction}`, cls:"allow", reason:"сама монета даёт тренд" };
      }
      if (coin.state === "RANGE" && coin.chaosRisk === "LOW") {
        return { text:"LOCAL CAUTION", cls:"caution", reason:"монета в range без сильной деградации" };
      }
      return { text:"LOCAL SKIP", cls:"skip", reason:"локально edge слабый" };
    }

    function btcAwareDecision(btc, coin){
      if (btc.state === "CHAOS") {
        return { text:"BTC FILTER: SKIP", cls:"skip", reason:"BTC в хаосе" };
      }
      if (btc.chaosRisk === "HIGH") {
        return { text:"BTC FILTER: SKIP", cls:"skip", reason:"BTC близок к хаосу" };
      }
      if (coin.state === "CHAOS") {
        return { text:"BTC FILTER: SKIP", cls:"skip", reason:"монета в хаосе" };
      }
      if (coin.chaosRisk === "HIGH") {
        return { text:"BTC FILTER: SKIP", cls:"skip", reason:"монета деградирует" };
      }
      if (btc.state === "TREND" && coin.state === "TREND" && btc.direction === coin.direction) {
        return { text:`BTC FILTER: ALLOW ${coin.direction}`, cls:"allow", reason:"BTC и монета согласованы" };
      }
      if (btc.state === "TREND" && coin.state === "TREND" && btc.direction !== coin.direction) {
        return { text:"BTC FILTER: CAUTION", cls:"caution", reason:"монета против BTC" };
      }
      if (btc.state === "RANGE" || coin.state === "RANGE") {
        return { text:"BTC FILTER: CAUTION", cls:"caution", reason:"переходный режим" };
      }
      return { text:"BTC FILTER: SKIP", cls:"skip", reason:"нет edge" };
    }

    async function fetchDominanceData(){
      const now = Date.now();

      if (
        dominanceCache.data &&
        now - dominanceCache.lastFetchTs < SETTINGS.DOMINANCE_REFRESH_MS
      ) {
        return dominanceCache.data;
      }

      const [globalRes, tetherRes] = await Promise.all([
        fetch("https://api.coingecko.com/api/v3/global", { cache: "no-store" }),
        fetch("https://api.coingecko.com/api/v3/coins/tether?localization=false&tickers=false&market_data=true&community_data=false&developer_data=false&sparkline=false", { cache: "no-store" })
      ]);

      if (!globalRes.ok) throw new Error(`CoinGecko global: ${globalRes.status}`);
      if (!tetherRes.ok) throw new Error(`CoinGecko tether: ${tetherRes.status}`);

      const globalJson = await globalRes.json();
      const tetherJson = await tetherRes.json();

      const totalMcap = globalJson?.data?.total_market_cap?.usd;
      const btcDom = globalJson?.data?.market_cap_percentage?.btc;
      const usdtMcap = tetherJson?.market_data?.market_cap?.usd;

      if (!totalMcap || !btcDom || !usdtMcap) {
        throw new Error("не удалось получить dominance data");
      }

      const usdtDom = (usdtMcap / totalMcap) * 100;

      if (!dominanceCache.baseline) {
        dominanceCache.baseline = {
          btcDom,
          usdtDom,
          ts: now
        };
      }

      const btcDelta = btcDom - dominanceCache.baseline.btcDom;
      const usdtDelta = usdtDom - dominanceCache.baseline.usdtDom;

      const data = {
        btcDom,
        usdtDom,
        btcDelta,
        usdtDelta,
        btcArrow: formatArrow(btcDelta),
        usdtArrow: formatArrow(usdtDelta),
        baselineTs: dominanceCache.baseline.ts
      };

      dominanceCache.data = data;
      dominanceCache.lastFetchTs = now;

      return data;
    }

    function marketGate(btc, dom){
      const reasons = [];

      if (btc.state === "CHAOS") reasons.push("BTC = CHAOS");
      if (btc.chaosRisk === "HIGH") reasons.push("BTC chaos risk = HIGH");
      if (btc.changes > btc.window * 0.45) reasons.push("слишком много разворотов");
      if (btc.dominantShareRaw < 0.60) reasons.push("нет доминирования");
      if (btc.avgWickRatioRaw > 2.5) reasons.push("грязные свечи");
      if (btc.maxRun < 3) reasons.push("нет серии");
      if (btc.netMoveRaw < 0.0025) reasons.push("нет импульса");

      if (dom) {
        if (dom.usdtDelta >= SETTINGS.USDT_DOM_NO_TRADE_DELTA) {
          reasons.push(`USDT.D растёт (${dom.usdtDelta.toFixed(2)} п.п.)`);
        }
        if (dom.btcDelta >= SETTINGS.BTC_DOM_SPIKE_DELTA) {
          reasons.push(`BTC.D растёт (${dom.btcDelta.toFixed(2)} п.п.)`);
        }
      }

      if (reasons.length > 0){
        return {
          text: "NO TRADE",
          cls: "skip",
          reason: reasons.join(" · ")
        };
      }

      return {
        text: "TRADE",
        cls: "allow",
        reason: "рынок достаточно чистый для запуска cbit"
      };
    }

    function renderTop(btc, data, gate, dom){
      const riskClass =
        btc.chaosRisk === "HIGH" ? "chaos" :
        btc.chaosRisk === "MEDIUM" ? "range" : "up";

      let general = "BTC = RANGE → осторожно";
      let generalClass = "range";

      if (btc.state === "CHAOS"){
        general = "BTC = CHAOS → не входить";
        generalClass = "chaos";
      } else if (btc.state === "TREND"){
        general = `BTC = TREND ${btc.direction} → проверяй совпадение`;
        generalClass = btc.direction === "UP" ? "up" : "down";
      }

      const localTradable = data.filter(
        x => x.symbol !== "BTCUSDT" && x.local.text.startsWith("LOCAL ALLOW")
      );
      const btcTradable = data.filter(
        x => x.symbol !== "BTCUSDT" && x.btcAware.text.startsWith("BTC FILTER: ALLOW")
      );

      const gateBoxClass = gate.cls === "allow" ? "okbox" : "dangerbox";

      const domBox = dom ? `
        <div class="split3" style="margin-top:12px;">
          <div class="card" style="padding:12px;border-radius:18px;background:rgba(22,38,75,0.85)">
            <div class="label">BTC.D</div>
            <div class="big ${dom.btcDelta > 0 ? "range" : dom.btcDelta < 0 ? "up" : "caution"}" style="margin-top:6px;">
              ${dom.btcDom.toFixed(2)}% ${dom.btcArrow}
            </div>
            <div class="mini">session delta: ${dom.btcDelta.toFixed(2)} п.п.</div>
          </div>
          <div class="card" style="padding:12px;border-radius:18px;background:rgba(22,38,75,0.85)">
            <div class="label">USDT.D</div>
            <div class="big ${dom.usdtDelta > 0 ? "chaos" : dom.usdtDelta < 0 ? "up" : "caution"}" style="margin-top:6px;">
              ${dom.usdtDom.toFixed(2)}% ${dom.usdtArrow}
            </div>
            <div class="mini">session delta: ${dom.usdtDelta.toFixed(2)} п.п.</div>
          </div>
          <div class="card" style="padding:12px;border-radius:18px;background:rgba(22,38,75,0.85)">
            <div class="label">Dominance logic</div>
            <div class="mini">
              BTC.D ↑ = альты слабее<br/>
              USDT.D ↑ = risk-off / деньги в кэш
            </div>
          </div>
        </div>
      ` : `
        <div class="warnbox">
          <div class="label">Dominance data</div>
          <div class="mini">ещё не загружено</div>
        </div>
      `;

      topCards.innerHTML = `
        <div class="card">
          <div class="headline">
            <div>
              <div class="label">Финальный gate для cbit</div>
              <div class="gate ${gate.cls}">${gate.text}</div>
            </div>
            <div style="text-align:right">
              <div class="label">Chaos risk BTC</div>
              <div class="big ${riskClass}">${btc.chaosRisk}</div>
            </div>
          </div>

          <div class="${gateBoxClass}">
            <div class="label">Причина решения</div>
            <div class="mini">${gate.reason}</div>
          </div>

          ${domBox}

          <div class="split" style="margin-top:12px">
            <div class="card" style="padding:12px;border-radius:18px;background:rgba(22,38,75,0.85)">
              <div class="label">BTC как глобальный фильтр</div>
              <div class="big ${generalClass}" style="margin-top:6px;">${general}</div>
              <div class="mini">
                net move: ${btc.netMovePct}% · run: ${btc.maxRun} · changes: ${btc.changes} ·
                dominance: ${btc.dominantShare}% · wick/body: ${btc.avgWickRatio}
              </div>
            </div>
            <div class="card" style="padding:12px;border-radius:18px;background:rgba(22,38,75,0.85)">
              <div class="label">Отдельно по монетам</div>
              <div class="mini">${localTradable.length ? localTradable.map(x => x.symbol.replace("USDT","")).join(", ") : "нет явных локальных трендов"}</div>
              <div class="label" style="margin-top:10px;">С учётом BTC</div>
              <div class="mini">${btcTradable.length ? btcTradable.map(x => x.symbol.replace("USDT","")).join(", ") : "ничего не подтверждено BTC"}</div>
            </div>
          </div>

          ${btc.predictorSignals.length ? `
            <div class="warnbox">
              <div class="label">Сигналы деградации BTC</div>
              <div class="mini">${btc.predictorSignals.join(" · ")}</div>
            </div>
          ` : ``}
        </div>
      `;
    }

    function renderCoins(data){
      coinCards.innerHTML = "";

      data
        .filter(x => x.symbol !== "BTCUSDT")
        .forEach(item => {
          const warningBox = item.predictorSignals.length
            ? `
              <div class="${item.chaosRisk === 'HIGH' ? 'dangerbox' : 'warnbox'}">
                <div class="label">Предиктор хаоса монеты</div>
                <div class="mini">${item.chaosRisk} · ${item.predictorSignals.join(" · ")}</div>
              </div>
            `
            : "";

          const btcBoxClass =
            item.btcAware.cls === "skip" ? "dangerbox" :
            item.btcAware.cls === "caution" ? "warnbox" : "infobox";

          const div = document.createElement("div");
          div.className = "card";
          div.innerHTML = `
            <div class="headline">
              <div class="coin">${item.symbol.replace("USDT","")}</div>
              <div class="price">${item.price.toFixed(item.symbol === "XRPUSDT" ? 4 : 2)}</div>
            </div>

            <div class="mode ${modeClass(item.state, item.direction)}">${modeText(item.state, item.direction)}</div>
            <div class="meta">
              <span>net move: ${item.netMovePct}%</span>
              <span>run: ${item.maxRun}</span>
              <span>changes: ${item.changes}</span>
              <span>dominance: ${item.dominantShare}%</span>
              <span>wick/body: ${item.avgWickRatio}</span>
            </div>

            <div class="infobox">
              <div class="label">Отдельно по монете</div>
              <div class="localDecision ${item.local.cls}">${item.local.text}</div>
              <div class="mini">${item.local.reason}</div>
            </div>

            <div class="${btcBoxClass}">
              <div class="label">С учётом BTC</div>
              <div class="decision ${item.btcAware.cls}">${item.btcAware.text}</div>
              <div class="mini">${item.btcAware.reason}</div>
            </div>

            ${warningBox}
          `;
          coinCards.appendChild(div);
        });
    }

    async function loadOne(symbol){
      const url = `https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=1m&limit=${LOOKBACK}`;
      const r = await fetch(url, { cache:"no-store" });
      if (!r.ok) throw new Error(`${symbol}: ${r.status}`);
      const candles = await r.json();
      const x = classify(candles);
      x.symbol = symbol;
      return x;
    }

    async function refreshAll(){
      appStatus.textContent = "Loading...";
      try{
        const [data, dom] = await Promise.all([
          Promise.all(SYMBOLS.map(loadOne)),
          fetchDominanceData().catch(() => null)
        ]);

        const btc = data.find(x => x.symbol === "BTCUSDT");
        const gate = marketGate(btc, dom);

        data.forEach(x => {
          x.local = localDecision(x);
          x.btcAware = btc.symbol === x.symbol
            ? { text:"—", cls:"caution", reason:"это сам BTC" }
            : btcAwareDecision(btc, x);
        });

        renderTop(btc, data, gate, dom);
        renderCoins(data);

        appStatus.textContent = `Updated ${new Date().toLocaleTimeString()} · window ${LOOKBACK}m`;
      } catch (e){
        appStatus.textContent = `Ошибка загрузки: ${e.message}`;
      }
    }

    function startAuto(){
      stopAuto();
      refreshAll();
      timer = setInterval(refreshAll, Number(intervalSelect.value));
      toggleBtn.textContent = "Stop";
    }

    function stopAuto(){
      if (timer){
        clearInterval(timer);
        timer = null;
      }
      toggleBtn.textContent = "Start";
    }

    refreshBtn.addEventListener("click", refreshAll);

    toggleBtn.addEventListener("click", () => {
      if (timer){
        stopAuto();
        appStatus.textContent = "Stopped";
      } else {
        startAuto();
      }
    });

    intervalSelect.addEventListener("change", () => {
      if (timer) startAuto();
    });

    refreshAll();
  </script>
</body>
</html>
