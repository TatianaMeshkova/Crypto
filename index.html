<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Crypto Chaos Terminal</title>
  <style>
    :root{
      --bg:#071226;
      --panel:#0f1d3a;
      --panel2:#16264b;
      --text:#eaf0ff;
      --muted:#9fb0d9;
      --ok:#17c964;
      --warn:#f5a524;
      --bad:#f31260;
      --border:#243b73;
      --btn:#79aaff;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
      background:linear-gradient(180deg,#06101f 0%, #0a1831 100%);
      color:var(--text);
      padding:18px 14px 28px;
    }
    .wrap{max-width:1100px;margin:0 auto}
    h1{
      margin:8px 0 6px;
      font-size:34px;
      line-height:1.04;
      font-weight:800;
      letter-spacing:-0.03em;
    }
    .sub{color:var(--muted);font-size:18px;margin-bottom:16px}
    .toolbar{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:10px;
    }
    button, select{
      border:none;
      border-radius:16px;
      padding:14px 16px;
      font-size:18px;
      font-weight:700;
    }
    button{
      background:var(--btn);
      color:#081427;
      min-width:120px;
    }
    select{
      background:var(--panel2);
      color:var(--text);
      border:1px solid var(--border);
    }
    .status{font-size:16px;color:var(--muted);margin:4px 0 14px}
    .sectionTitle{font-size:20px;font-weight:800;margin:18px 0 10px}
    .topgrid,.grid{
      display:grid;
      grid-template-columns:1fr;
      gap:12px;
    }
    .card{
      background:rgba(15,29,58,0.95);
      border:1px solid var(--border);
      border-radius:22px;
      padding:16px;
      box-shadow:0 10px 25px rgba(0,0,0,0.16);
    }
    .headline{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
    }
    .coin{font-size:26px;font-weight:800}
    .price{font-size:20px;font-weight:700}
    .mode{font-size:22px;font-weight:800;margin-top:10px}
    .bias{font-size:16px;font-weight:700;margin-top:6px;color:var(--muted)}
    .gate{font-size:28px;font-weight:900;margin-top:6px}
    .big{font-size:24px;font-weight:800}
    .chaosLevel{font-size:30px;font-weight:900;margin-top:6px}
    .label{color:var(--muted);font-size:14px}
    .mini{font-size:15px;color:var(--muted);margin-top:8px;line-height:1.4}
    .meta{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      color:var(--muted);
      font-size:14px;
      margin-top:10px;
    }
    .up{color:var(--ok)}
    .down{color:var(--bad)}
    .range{color:var(--warn)}
    .chaos{color:var(--bad)}
    .allow{color:var(--ok)}
    .caution{color:var(--warn)}
    .skip{color:var(--bad)}
    .split{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }
    .split3{
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:12px;
    }
    .split4{
      display:grid;
      grid-template-columns:1fr 1fr 1fr 1fr;
      gap:12px;
    }
    .warnbox,.dangerbox,.infobox,.okbox{
      border-radius:18px;
      padding:12px;
      margin-top:10px;
    }
    .warnbox{
      border:1px solid rgba(245,165,36,0.35);
      background:rgba(245,165,36,0.08);
    }
    .dangerbox{
      border:1px solid rgba(243,18,96,0.35);
      background:rgba(243,18,96,0.08);
    }
    .infobox{
      border:1px solid rgba(121,170,255,0.35);
      background:rgba(121,170,255,0.08);
    }
    .okbox{
      border:1px solid rgba(23,201,100,0.35);
      background:rgba(23,201,100,0.08);
    }
    @media (max-width:980px){
      .split4{grid-template-columns:1fr 1fr}
    }
    @media (max-width:880px){
      .split3{grid-template-columns:1fr}
    }
    @media (max-width:640px){
      .split,.split4{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Crypto Chaos Terminal</h1>
    <div class="sub">BTC • ETH • SOL • XRP • независимая оценка каждой монеты • общая оценка хаоса по рынку</div>

    <div class="toolbar">
      <button id="refreshBtn">Refresh</button>
      <button id="toggleBtn">Start</button>
      <select id="intervalSelect">
        <option value="10000">10 sec</option>
        <option value="15000" selected>15 sec</option>
        <option value="30000">30 sec</option>
        <option value="60000">60 sec</option>
      </select>
    </div>

    <div id="appStatus" class="status">Stopped</div>

    <div class="topgrid" id="topCards"></div>

    <div class="sectionTitle">Монеты</div>
    <div class="grid" id="coinCards"></div>
  </div>

  <script>
    const SYMBOLS = ["BTCUSDT", "ETHUSDT", "SOLUSDT", "XRPUSDT"];
    const LOOKBACK = 30;

    // ВСТАВЬ СВОЙ КЛЮЧ ИЛИ ОСТАВЬ КАК ЕСТЬ, ЕСЛИ НЕ НУЖЕН КАЛЕНДАРЬ
    const TE_API_KEY = "YOUR_TRADING_ECONOMICS_API_KEY";

    const SETTINGS = {
      DOMINANCE_REFRESH_MS: 60000,
      CALENDAR_REFRESH_MS: 300000,

      USDT_DOM_MEDIUM_DELTA: 0.05,
      USDT_DOM_HIGH_DELTA: 0.10,
      BTC_DOM_MEDIUM_DELTA: 0.08,
      BTC_DOM_HIGH_DELTA: 0.15,

      CALENDAR_HIGH_WINDOW_MIN: 60,
      CALENDAR_MEDIUM_WINDOW_MIN: 120
    };

    const appStatus = document.getElementById("appStatus");
    const topCards = document.getElementById("topCards");
    const coinCards = document.getElementById("coinCards");
    const refreshBtn = document.getElementById("refreshBtn");
    const toggleBtn = document.getElementById("toggleBtn");
    const intervalSelect = document.getElementById("intervalSelect");

    let timer = null;

    let dominanceCache = {
      data: null,
      lastFetchTs: 0,
      baseline: null
    };

    let calendarCache = {
      data: null,
      lastFetchTs: 0
    };

    function clamp(value, min, max){
      return Math.max(min, Math.min(max, value));
    }

    function formatArrow(delta){
      if (delta == null) return "—";
      if (delta > 0.0001) return "↑";
      if (delta < -0.0001) return "↓";
      return "→";
    }

    function modeClass(state, direction){
      if (state === "TREND") return direction === "UP" ? "up" : "down";
      if (state === "CHAOS") return "chaos";
      return "range";
    }

    function modeText(state, direction){
      if (state === "TREND") return `TREND ${direction}`;
      return state;
    }

    function directionBiasText(state, direction){
      if (state === "TREND") return `Direction bias: ${direction}`;
      if (state === "RANGE") return `Range bias: ${direction}`;
      return `Chaos bias: ${direction}`;
    }

    function classify(candles){
      const dirs = [];
      const opens = [];
      const closes = [];
      const wickRatios = [];

      for (const c of candles){
        const o = Number(c[1]);
        const h = Number(c[2]);
        const l = Number(c[3]);
        const cl = Number(c[4]);

        const body = Math.abs(cl - o);
        const totalRange = h - l;
        const wick = Math.max(0, totalRange - body);

        let ratio = body > 0 ? wick / body : 10;
        ratio = Math.min(ratio, 10);
        wickRatios.push(ratio);

        opens.push(o);
        closes.push(cl);

        if (cl > o) dirs.push(1);
        else if (cl < o) dirs.push(-1);
        else dirs.push(0);
      }

      let maxRun = 1;
      let curRun = 1;
      for (let i = 1; i < dirs.length; i++){
        if (dirs[i] !== 0 && dirs[i] === dirs[i - 1]){
          curRun++;
          maxRun = Math.max(maxRun, curRun);
        } else {
          curRun = 1;
        }
      }

      let changes = 0;
      let prev = null;
      let upCount = 0;
      let downCount = 0;

      for (const d of dirs){
        if (d === 1) upCount++;
        else if (d === -1) downCount++;

        if (d === 0) continue;
        if (prev !== null && d !== prev) changes++;
        prev = d;
      }

      const n = candles.length;
      const firstOpen = opens[0];
      const lastClose = closes[closes.length - 1];
      const netMove = Math.abs(lastClose / firstOpen - 1);
      const direction = lastClose >= firstOpen ? "UP" : "DOWN";

      const dominantShare = Math.max(upCount, downCount) / Math.max(1, (upCount + downCount));
      const avgWickRatio = wickRatios.reduce((a,b)=>a+b,0) / wickRatios.length;

      const trend = (
        maxRun >= 4 &&
        netMove >= 0.0035 &&
        changes <= Math.floor(n * 0.30) &&
        dominantShare >= 0.65 &&
        avgWickRatio <= 1.8
      );

      const chaos = (
        maxRun <= 2 &&
        changes >= Math.floor(n * 0.55) &&
        netMove < 0.0025 &&
        dominantShare <= 0.58 &&
        avgWickRatio >= 1.8
      );

      let state = "RANGE";
      if (trend) state = "TREND";
      else if (chaos) state = "CHAOS";

      const predictorSignals = [];
      if (maxRun <= 3) predictorSignals.push("серии короткие");
      if (changes >= Math.floor(n * 0.45)) predictorSignals.push("много разворотов");
      if (dominantShare < 0.62) predictorSignals.push("нет доминирования");
      if (avgWickRatio > 1.6) predictorSignals.push("грязные свечи");
      if (netMove < 0.0030) predictorSignals.push("слабый net move");

      let chaosRisk = "LOW";
      if (predictorSignals.length >= 4) chaosRisk = "HIGH";
      else if (predictorSignals.length >= 2) chaosRisk = "MEDIUM";

      return {
        state,
        direction,
        price: lastClose,
        maxRun,
        changes,
        netMovePct: (netMove * 100).toFixed(3),
        netMoveRaw: netMove,
        avgWickRatio: avgWickRatio.toFixed(2),
        avgWickRatioRaw: avgWickRatio,
        dominantShare: (dominantShare * 100).toFixed(0),
        dominantShareRaw: dominantShare,
        chaosRisk,
        predictorSignals,
        window: n
      };
    }

    async function fetchDominanceData(){
      const now = Date.now();

      if (dominanceCache.data && now - dominanceCache.lastFetchTs < SETTINGS.DOMINANCE_REFRESH_MS) {
        return dominanceCache.data;
      }

      const [globalRes, tetherRes] = await Promise.all([
        fetch("https://api.coingecko.com/api/v3/global", { cache: "no-store" }),
        fetch("https://api.coingecko.com/api/v3/coins/tether?localization=false&tickers=false&market_data=true&community_data=false&developer_data=false&sparkline=false", { cache: "no-store" })
      ]);

      if (!globalRes.ok) throw new Error(`CoinGecko global: ${globalRes.status}`);
      if (!tetherRes.ok) throw new Error(`CoinGecko tether: ${tetherRes.status}`);

      const globalJson = await globalRes.json();
      const tetherJson = await tetherRes.json();

      const totalMcap = globalJson?.data?.total_market_cap?.usd;
      const btcDom = globalJson?.data?.market_cap_percentage?.btc;
      const usdtMcap = tetherJson?.market_data?.market_cap?.usd;

      if (!totalMcap || !btcDom || !usdtMcap) {
        throw new Error("не удалось получить dominance data");
      }

      const usdtDom = (usdtMcap / totalMcap) * 100;

      if (!dominanceCache.baseline) {
        dominanceCache.baseline = {
          btcDom,
          usdtDom,
          ts: now
        };
      }

      const btcDelta = btcDom - dominanceCache.baseline.btcDom;
      const usdtDelta = usdtDom - dominanceCache.baseline.usdtDom;

      const data = {
        btcDom,
        usdtDom,
        btcDelta,
        usdtDelta,
        btcArrow: formatArrow(btcDelta),
        usdtArrow: formatArrow(usdtDelta)
      };

      dominanceCache.data = data;
      dominanceCache.lastFetchTs = now;
      return data;
    }

    function formatDistance(ms){
      const abs = Math.abs(ms);
      const totalMin = Math.floor(abs / 60000);
      const h = Math.floor(totalMin / 60);
      const m = totalMin % 60;
      if (h > 0) return `${h}h ${m}m`;
      return `${m}m`;
    }

    async function fetchEconomicCalendar(){
      const now = Date.now();

      if (calendarCache.data && now - calendarCache.lastFetchTs < SETTINGS.CALENDAR_REFRESH_MS) {
        return calendarCache.data;
      }

      if (!TE_API_KEY || TE_API_KEY === "YOUR_TRADING_ECONOMICS_API_KEY") {
        return null;
      }

      const url = `https://api.tradingeconomics.com/calendar?c=${encodeURIComponent(TE_API_KEY)}`;
      const res = await fetch(url, { cache: "no-store" });

      if (!res.ok) {
        throw new Error(`Trading Economics calendar: ${res.status}`);
      }

      const data = await res.json();
      calendarCache.data = data;
      calendarCache.lastFetchTs = now;
      return data;
    }

    function normalizeCalendarEvent(e){
      return {
        name: e.Event || e.Category || "Unknown event",
        country: e.Country || "",
        importance: Number(e.Importance || 0),
        date: e.Date,
        dateMs: e.Date ? new Date(e.Date).getTime() : null
      };
    }

    function getClosestHighImpactEvent(events){
      if (!Array.isArray(events) || !events.length) return null;

      const now = Date.now();

      const filtered = events
        .map(normalizeCalendarEvent)
        .filter(e => e.dateMs && e.importance >= 2 && e.dateMs > now - 60 * 60000)
        .sort((a,b) => a.dateMs - b.dateMs);

      if (!filtered.length) return null;

      const ev = filtered[0];
      const startsInMs = ev.dateMs - now;
      const isLive = startsInMs <= 0 && startsInMs >= -60 * 60000;

      return {
        ...ev,
        startsInMs,
        startsInText: isLive ? "LIVE / recent" : formatDistance(startsInMs),
        isLive
      };
    }

    function computeDominanceEventRisk(dom){
      if (!dom) {
        return {
          level: "UNKNOWN",
          cls: "caution",
          score: 0,
          reasons: ["dominance data unavailable"]
        };
      }

      const reasons = [];
      let score = 0;

      if (dom.usdtDelta >= SETTINGS.USDT_DOM_HIGH_DELTA) {
        score += 45;
        reasons.push(`USDT.D сильно растёт (${dom.usdtDelta.toFixed(2)} п.п.)`);
      } else if (dom.usdtDelta >= SETTINGS.USDT_DOM_MEDIUM_DELTA) {
        score += 25;
        reasons.push(`USDT.D растёт (${dom.usdtDelta.toFixed(2)} п.п.)`);
      }

      if (dom.btcDelta >= SETTINGS.BTC_DOM_HIGH_DELTA) {
        score += 30;
        reasons.push(`BTC.D сильно растёт (${dom.btcDelta.toFixed(2)} п.п.)`);
      } else if (dom.btcDelta >= SETTINGS.BTC_DOM_MEDIUM_DELTA) {
        score += 15;
        reasons.push(`BTC.D растёт (${dom.btcDelta.toFixed(2)} п.п.)`);
      }

      if (score >= 50) return { level:"HIGH", cls:"skip", score, reasons };
      if (score >= 20) return { level:"MEDIUM", cls:"caution", score, reasons };

      return {
        level: "LOW",
        cls: "allow",
        score,
        reasons: reasons.length ? reasons : ["dominance спокойная"]
      };
    }

    function computeCalendarEventRisk(events){
      if (!events) {
        return {
          level: "UNKNOWN",
          cls: "caution",
          score: 0,
          reasons: ["economic calendar disabled or unavailable"],
          closest: null
        };
      }

      const closest = getClosestHighImpactEvent(events);

      if (!closest) {
        return {
          level: "LOW",
          cls: "allow",
          score: 0,
          reasons: ["близких high-impact событий нет"],
          closest: null
        };
      }

      const minutes = closest.startsInMs / 60000;
      let score = 0;
      const reasons = [];

      if (closest.isLive) {
        score = closest.importance >= 3 ? 90 : 70;
        reasons.push(`${closest.name} сейчас идёт/только вышло`);
      } else if (minutes <= SETTINGS.CALENDAR_HIGH_WINDOW_MIN) {
        score = closest.importance >= 3 ? 80 : 60;
        reasons.push(`${closest.name} через ${closest.startsInText}`);
      } else if (minutes <= SETTINGS.CALENDAR_MEDIUM_WINDOW_MIN) {
        score = closest.importance >= 3 ? 40 : 25;
        reasons.push(`${closest.name} через ${closest.startsInText}`);
      } else {
        score = 0;
        reasons.push(`ближайшее событие: ${closest.name} через ${closest.startsInText}`);
      }

      let level = "LOW";
      let cls = "allow";
      if (score >= 60) {
        level = "HIGH";
        cls = "skip";
      } else if (score >= 20) {
        level = "MEDIUM";
        cls = "caution";
      }

      return { level, cls, score, reasons, closest };
    }

    function mergeEventRisk(domRisk, calRisk){
      const scores = [domRisk.score, calRisk.score].filter(x => typeof x === "number");
      const score = scores.length ? Math.max(...scores) : 0;

      const reasons = [
        ...(domRisk.score > 0 ? domRisk.reasons : []),
        ...(calRisk.score > 0 ? calRisk.reasons : [])
      ];

      let level = "LOW";
      let cls = "allow";
      if (score >= 60) {
        level = "HIGH";
        cls = "skip";
      } else if (score >= 20) {
        level = "MEDIUM";
        cls = "caution";
      }

      return {
        level,
        cls,
        score,
        reasons: reasons.length ? reasons : ["внешний событийный риск не подтверждён"],
        closest: calRisk.closest || null
      };
    }

    function computeTechnicalChaos(asset){
      let score = 0;
      const reasons = [];

      if (asset.state === "CHAOS") {
        score += 40;
        reasons.push(`${asset.symbol.replace("USDT","")} = CHAOS`);
      }
      if (asset.chaosRisk === "HIGH") {
        score += 30;
        reasons.push("chaos risk = HIGH");
      } else if (asset.chaosRisk === "MEDIUM") {
        score += 15;
        reasons.push("chaos risk = MEDIUM");
      }

      if (asset.changes > asset.window * 0.45) {
        score += 20;
        reasons.push("слишком много разворотов");
      } else if (asset.changes > asset.window * 0.35) {
        score += 10;
        reasons.push("разворотов выше нормы");
      }

      if (asset.dominantShareRaw < 0.58) {
        score += 20;
        reasons.push("нет доминирования");
      } else if (asset.dominantShareRaw < 0.62) {
        score += 10;
        reasons.push("слабое доминирование");
      }

      if (asset.avgWickRatioRaw > 2.5) {
        score += 20;
        reasons.push("грязные свечи");
      } else if (asset.avgWickRatioRaw > 1.8) {
        score += 10;
        reasons.push("тени выше нормы");
      }

      if (asset.maxRun < 3) {
        score += 15;
        reasons.push("нет серии");
      }

      if (asset.netMoveRaw < 0.0025) {
        score += 15;
        reasons.push("нет импульса");
      }

      score = clamp(score, 0, 100);

      let level = "LOW";
      let cls = "allow";
      if (score >= 60) {
        level = "HIGH";
        cls = "skip";
      } else if (score >= 30) {
        level = "MEDIUM";
        cls = "caution";
      }

      return { level, cls, score, reasons };
    }

    function computeFinalChaos(technical, eventRisk){
      const score = clamp(Math.max(technical.score, eventRisk.score), 0, 100);
      const reasons = [...technical.reasons, ...eventRisk.reasons];

      let level = "LOW";
      let cls = "allow";
      if (technical.level === "HIGH" || eventRisk.level === "HIGH" || score >= 60) {
        level = "HIGH";
        cls = "skip";
      } else if (technical.level === "MEDIUM" || eventRisk.level === "MEDIUM" || score >= 30) {
        level = "MEDIUM";
        cls = "caution";
      }

      return { level, cls, score, reasons };
    }

    function marketGate(finalChaos){
      if (finalChaos.level === "HIGH") {
        return {
          text: "DO NOT START",
          cls: "skip",
          reason: finalChaos.reasons.join(" · ")
        };
      }
      if (finalChaos.level === "MEDIUM") {
        return {
          text: "CAUTION",
          cls: "caution",
          reason: finalChaos.reasons.join(" · ")
        };
      }
      return {
        text: "START OK",
        cls: "allow",
        reason: "хаос низкий, рынок достаточно чистый"
      };
    }

    function computeOverallMarketChaos(data){
      const scores = data.map(x => x.finalChaos.score);
      const avgScore = scores.reduce((a,b)=>a+b,0) / Math.max(1, scores.length);
      const highCount = data.filter(x => x.finalChaos.level === "HIGH").length;
      const mediumCount = data.filter(x => x.finalChaos.level === "MEDIUM").length;
      const lowCount = data.filter(x => x.finalChaos.level === "LOW").length;

      let level = "LOW";
      let cls = "allow";

      if (highCount >= 2 || avgScore >= 60) {
        level = "HIGH";
        cls = "skip";
      } else if (highCount >= 1 || mediumCount >= 2 || avgScore >= 30) {
        level = "MEDIUM";
        cls = "caution";
      }

      const reasons = [];
      if (highCount >= 2) reasons.push("минимум 2 монеты в HIGH chaos");
      if (highCount >= 1 && mediumCount >= 1) reasons.push("часть рынка уже сломана");
      if (avgScore >= 60) reasons.push(`средний chaos score ${avgScore.toFixed(0)}`);
      else if (avgScore >= 30) reasons.push(`средний chaos score ${avgScore.toFixed(0)}`);
      if (!reasons.length) reasons.push("большая часть монет выглядит спокойно");

      return {
        level,
        cls,
        score: Math.round(avgScore),
        highCount,
        mediumCount,
        lowCount,
        reasons
      };
    }

    function renderTop(data, dom, eventRisk, overall){
      const startable = data.filter(x => x.gate.text === "START OK");
      const caution = data.filter(x => x.gate.text === "CAUTION");
      const blocked = data.filter(x => x.gate.text === "DO NOT START");
      const closest = eventRisk.closest;

      topCards.innerHTML = `
        <div class="card">
          <div class="headline">
            <div>
              <div class="label">Общая оценка хаоса на рынке</div>
              <div class="chaosLevel ${overall.cls}">${overall.level}</div>
            </div>
            <div style="text-align:right">
              <div class="label">Средний chaos score</div>
              <div class="big ${overall.cls}">${overall.score}/100</div>
            </div>
          </div>

          <div class="${overall.cls === 'allow' ? 'okbox' : overall.cls === 'caution' ? 'warnbox' : 'dangerbox'}">
            <div class="label">Вывод по рынку</div>
            <div class="mini">${overall.reasons.join(" · ")}</div>
          </div>

          <div class="split4" style="margin-top:12px;">
            <div class="card" style="padding:12px;border-radius:18px;background:rgba(22,38,75,0.85)">
              <div class="label">START OK</div>
              <div class="big allow" style="margin-top:6px;">${startable.length}</div>
              <div class="mini">${startable.length ? startable.map(x => x.symbol.replace("USDT","")).join(", ") : "нет"}</div>
            </div>
            <div class="card" style="padding:12px;border-radius:18px;background:rgba(22,38,75,0.85)">
              <div class="label">CAUTION</div>
              <div class="big caution" style="margin-top:6px;">${caution.length}</div>
              <div class="mini">${caution.length ? caution.map(x => x.symbol.replace("USDT","")).join(", ") : "нет"}</div>
            </div>
            <div class="card" style="padding:12px;border-radius:18px;background:rgba(22,38,75,0.85)">
              <div class="label">DO NOT START</div>
              <div class="big skip" style="margin-top:6px;">${blocked.length}</div>
              <div class="mini">${blocked.length ? blocked.map(x => x.symbol.replace("USDT","")).join(", ") : "нет"}</div>
            </div>
            <div class="card" style="padding:12px;border-radius:18px;background:rgba(22,38,75,0.85)">
              <div class="label">Closest event</div>
              <div class="big ${eventRisk.cls}" style="margin-top:6px;">${closest ? closest.name : "None"}</div>
              <div class="mini">${closest ? (closest.isLive ? "LIVE / recent" : `starts in: ${closest.startsInText}`) : "близких событий нет"}</div>
            </div>
          </div>

          <div class="split3" style="margin-top:12px;">
            <div class="card" style="padding:12px;border-radius:18px;background:rgba(22,38,75,0.85)">
              <div class="label">Event risk</div>
              <div class="big ${eventRisk.cls}" style="margin-top:6px;">${eventRisk.level}</div>
              <div class="mini">score: ${eventRisk.score}/100</div>
              <div class="mini">${eventRisk.reasons.join(" · ")}</div>
            </div>
            <div class="card" style="padding:12px;border-radius:18px;background:rgba(22,38,75,0.85)">
              <div class="label">BTC.D</div>
              <div class="big ${dom && dom.btcDelta > 0 ? "range" : dom && dom.btcDelta < 0 ? "up" : "caution"}" style="margin-top:6px;">
                ${dom ? `${dom.btcDom.toFixed(2)}% ${dom.btcArrow}` : "—"}
              </div>
              <div class="mini">${dom ? `session delta: ${dom.btcDelta.toFixed(2)} п.п.` : "нет данных"}</div>
            </div>
            <div class="card" style="padding:12px;border-radius:18px;background:rgba(22,38,75,0.85)">
              <div class="label">USDT.D</div>
              <div class="big ${dom && dom.usdtDelta > 0 ? "chaos" : dom && dom.usdtDelta < 0 ? "up" : "caution"}" style="margin-top:6px;">
                ${dom ? `${dom.usdtDom.toFixed(2)}% ${dom.usdtArrow}` : "—"}
              </div>
              <div class="mini">${dom ? `session delta: ${dom.usdtDelta.toFixed(2)} п.п.` : "нет данных"}</div>
            </div>
          </div>
        </div>
      `;
    }

    function renderCoinsIndependent(data){
      coinCards.innerHTML = "";

      data.forEach(item => {
        const warningBox = item.predictorSignals.length
          ? `
            <div class="${item.chaosRisk === 'HIGH' ? 'dangerbox' : 'warnbox'}">
              <div class="label">Предиктор хаоса</div>
              <div class="mini">${item.chaosRisk} · ${item.predictorSignals.join(" · ")}</div>
            </div>
          `
          : "";

        const gateBoxClass =
          item.gate.cls === "allow" ? "okbox" :
          item.gate.cls === "caution" ? "warnbox" : "dangerbox";

        const div = document.createElement("div");
        div.className = "card";
        div.innerHTML = `
          <div class="headline">
            <div class="coin">${item.symbol.replace("USDT","")}</div>
            <div class="price">${item.price.toFixed(item.symbol === "XRPUSDT" ? 4 : 2)}</div>
          </div>

          <div class="mode ${modeClass(item.state, item.direction)}">${modeText(item.state, item.direction)}</div>
          <div class="bias ${item.direction === 'UP' ? 'up' : 'down'}">${directionBiasText(item.state, item.direction)}</div>

          <div class="split3" style="margin-top:12px;">
            <div class="card" style="padding:12px;border-radius:18px;background:rgba(22,38,75,0.85)">
              <div class="label">Technical chaos</div>
              <div class="big ${item.technical.cls}" style="margin-top:6px;">${item.technical.level}</div>
              <div class="mini">score: ${item.technical.score}/100</div>
            </div>
            <div class="card" style="padding:12px;border-radius:18px;background:rgba(22,38,75,0.85)">
              <div class="label">Event risk</div>
              <div class="big ${item.eventRisk.cls}" style="margin-top:6px;">${item.eventRisk.level}</div>
              <div class="mini">score: ${item.eventRisk.score}/100</div>
            </div>
            <div class="card" style="padding:12px;border-radius:18px;background:rgba(22,38,75,0.85)">
              <div class="label">Final chaos</div>
              <div class="big ${item.finalChaos.cls}" style="margin-top:6px;">${item.finalChaos.level}</div>
              <div class="mini">score: ${item.finalChaos.score}/100</div>
            </div>
          </div>

          <div class="${gateBoxClass}">
            <div class="label">Решение по монете</div>
            <div class="gate ${item.gate.cls}">${item.gate.text}</div>
            <div class="mini">${item.gate.reason}</div>
          </div>

          <div class="meta">
            <span>net move: ${item.netMovePct}%</span>
            <span>run: ${item.maxRun}</span>
            <span>changes: ${item.changes}</span>
            <span>dominance: ${item.dominantShare}%</span>
            <span>wick/body: ${item.avgWickRatio}</span>
          </div>

          ${warningBox}
        `;
        coinCards.appendChild(div);
      });
    }

    async function loadOne(symbol){
      const url = `https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=1m&limit=${LOOKBACK}`;
      const r = await fetch(url, { cache:"no-store" });
      if (!r.ok) throw new Error(`${symbol}: ${r.status}`);
      const candles = await r.json();
      const x = classify(candles);
      x.symbol = symbol;
      return x;
    }

    async function refreshAll(){
      appStatus.textContent = "Loading...";
      try{
        const [data, dom, cal] = await Promise.all([
          Promise.all(SYMBOLS.map(loadOne)),
          fetchDominanceData().catch(() => null),
          fetchEconomicCalendar().catch(() => null)
        ]);

        const domRisk = computeDominanceEventRisk(dom);
        const calRisk = computeCalendarEventRisk(cal);
        const mergedEventRisk = mergeEventRisk(domRisk, calRisk);

        data.forEach(x => {
          x.technical = computeTechnicalChaos(x);
          x.eventRisk = mergedEventRisk;
          x.finalChaos = computeFinalChaos(x.technical, x.eventRisk);
          x.gate = marketGate(x.finalChaos);
        });

        const overall = computeOverallMarketChaos(data);

        renderTop(data, dom, mergedEventRisk, overall);
        renderCoinsIndependent(data);

        appStatus.textContent = `Updated ${new Date().toLocaleTimeString()} · window ${LOOKBACK}m`;
      } catch (e){
        appStatus.textContent = `Ошибка загрузки: ${e.message}`;
      }
    }

    function startAuto(){
      stopAuto();
      refreshAll();
      timer = setInterval(refreshAll, Number(intervalSelect.value));
      toggleBtn.textContent = "Stop";
    }

    function stopAuto(){
      if (timer){
        clearInterval(timer);
        timer = null;
      }
      toggleBtn.textContent = "Start";
    }

    refreshBtn.addEventListener("click", refreshAll);
    toggleBtn.addEventListener("click", () => {
      if (timer){
        stopAuto();
        appStatus.textContent = "Stopped";
      } else {
        startAuto();
      }
    });
    intervalSelect.addEventListener("change", () => {
      if (timer) startAuto();
    });

    refreshAll();
  </script>
</body>
</html>
